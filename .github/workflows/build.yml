on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

name: Build
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Prettier
        run: bun prettier . --check
      - name: Check types
        run: bun run typecheck